<div class="min-h-screen flex flex-col items-center justify-center bg-slate-100 font-sans antialiased px-4">
  
  <div class="bg-white w-full max-w-[400px] p-8 rounded-xl shadow-md border border-slate-200">
    
    <div class="text-center mb-6">
      <h1 class="text-3xl font-extrabold text-blue-700 tracking-tight">
        SisCom CEHAP
      </h1>
      <p class="text-sm text-slate-500 mt-1 font-medium">
        Acesse a plataforma com suas credenciais
      </p>
    </div>

    @if (errorMessage()) {
      <div class="mb-5 bg-[#ffdad6] text-[#93000a] text-sm font-semibold p-3 rounded-lg border border-[#ba1a1a] flex items-center gap-2">
        <span class="material-symbols-outlined text-[18px]">error</span>
        {{ errorMessage() }}
      </div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
      
      <div>
        <label for="email" class="block text-sm font-semibold text-slate-700 mb-1">E-mail</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          placeholder="nome.sobrenome@cehap.pb.gov.br"
          class="w-full px-3.5 py-2.5 rounded-lg border border-slate-300 bg-white text-slate-900 placeholder-slate-400 text-sm focus:outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-100 transition-all"
        >
      </div>

      <div>
        <label for="password" class="block text-sm font-semibold text-slate-700 mb-1">Senha</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          placeholder="••••••••"
          class="w-full px-3.5 py-2.5 rounded-lg border border-slate-300 bg-white text-slate-900 placeholder-slate-400 text-sm focus:outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-100 transition-all"
        >
      </div>

      <div class="flex items-center justify-between text-sm pt-1">
        <label class="flex items-center text-slate-600 font-medium cursor-pointer select-none">
          <input 
            type="checkbox" 
            formControlName="rememberMe" 
            class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer mr-2"
          >
          Lembrar-me
        </label>

        <a href="#" class="font-semibold text-blue-600 hover:text-blue-700 hover:underline transition-colors">
          Esqueci minha senha
        </a>
      </div>

      <div class="pt-2">
        <button 
          type="submit" 
          [disabled]="loginForm.invalid || isLoading()"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg text-sm shadow-sm transition-colors duration-150 disabled:bg-slate-300 disabled:text-slate-500 disabled:cursor-not-allowed flex justify-center items-center gap-2"
        >
          @if (isLoading()) {
            <span class="material-symbols-outlined animate-spin text-[18px]">progress_activity</span>
            Entrando...
          } @else {
            Entrar
          }
        </button>
      </div>

    </form>

    <div class="mt-6 text-center text-xs text-slate-400 border-t border-slate-100 pt-4">
      &copy; 2026 CEHAP. Todos os direitos reservados.
    </div>

  </div>
</div>

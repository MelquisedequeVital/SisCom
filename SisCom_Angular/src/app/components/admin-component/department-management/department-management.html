<div class="w-full flex flex-col gap-6">

    <div class="flex items-center justify-between border-b border-gray-200 pb-5">
        <div class="flex flex-col">
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Lista de Departamentos</h1>
            <p class="text-xs text-gray-500 mt-1">Gerenciamento completo de setores e departamentos do SisCom.</p>
        </div>

        <button
            class="h-10 px-4 bg-[#002B93] hover:bg-[#002271] text-white font-medium rounded-lg text-sm flex items-center gap-2 shadow-sm transition-colors shrink-0" 
            (click)="abrirModalCadastro()">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            Adicionar Departamento
        </button>
    </div>

    <div class="flex flex-col w-full gap-3">
        @for (item of departmentsList(); track item.id) {
            <app-dept-card 
                [department]="item" 
                (onEdit)="editarDepartamento($event)" 
                (onDelete)="removerDepartamento($event)">
            </app-dept-card>
        } @empty {
            <div class="flex flex-col items-center justify-center p-12 bg-white border border-dashed border-gray-300 rounded-xl text-center">
                <span class="text-2xl mb-2">🏢</span>
                <h3 class="text-sm font-semibold text-gray-900">Nenhum departamento cadastrado</h3>
                <p class="text-xs text-gray-500 max-w-xs mt-1">Clique no botão superior para iniciar um novo registro.</p>
            </div>
        }
    </div>

</div>

@if (isModalOpen()) {
    <app-dept-modal 
        [deptToEdit]="deptToEdit()" 
        (onClose)="fecharModal()"
        (onSave)="gravarDados($event)">
    </app-dept-modal>
}

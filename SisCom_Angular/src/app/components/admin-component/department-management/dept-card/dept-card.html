<div class="w-full bg-white border border-gray-200 rounded-xl px-5 py-3 shadow-sm hover:shadow-md hover:border-gray-300 transition-all flex items-center justify-between mb-2">
    
    <div class="flex items-center gap-4 min-w-0">
        <div class="w-10 h-10 rounded-lg bg-blue-50 text-[#002B93] flex items-center justify-center text-lg shrink-0 border border-blue-100">
            🏢
        </div>

        <div class="flex flex-col min-w-0">
            <span class="text-sm font-bold text-gray-900 truncate">{{ department().name }}</span>
            <span class="text-xs text-gray-500 font-medium mt-0.5">
                Código: {{ department().code }}
            </span>
        </div>
    </div>

    <div class="flex items-center gap-2">
        <button (click)="onEdit.emit(department())"
            class="p-2 text-gray-500 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors"
            title="Editar departamento">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
            </svg>
        </button>

        <button (click)="onDelete.emit(department().id)"
            class="p-2 text-gray-500 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors"
            title="Excluir departamento">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        </button>
    </div>
</div>
